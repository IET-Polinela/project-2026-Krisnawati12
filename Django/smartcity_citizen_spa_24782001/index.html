<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; } 
        .spa-container { min-height: calc(100vh - 80px); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>Smart City Portal
            </a>
            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <!-- Modal: Buat / Edit Laporan -->
    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Buat Laporan Baru
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="reportForm" onsubmit="return false;">
                        <!-- Field: Title -->
                        <div class="mb-3">
                            <label for="reportTitle" class="form-label">Judul</label>
                            <input type="text" id="reportTitle" class="form-control" placeholder="Masukkan judul laporan" required />
                        </div>

                        <!-- Field: Category -->
                        <div class="mb-3">
                            <label for="reportCategory" class="form-label">Kategori</label>
                            <select id="reportCategory" class="form-select">
                                <option value="">Pilih kategori</option>
                                <option value="infrastruktur">Infrastruktur</option>
                                <option value="kebersihan">Kebersihan</option>
                                <option value="keamanan">Keamanan</option>
                                <!-- Tambah opsi sesuai kebutuhan -->
                            </select>
                        </div>

                        <!-- Field: Description -->
                        <div class="mb-3">
                            <label for="reportDescription" class="form-label">Deskripsi</label>
                            <textarea id="reportDescription" class="form-control" rows="4" placeholder="Jelaskan masalah atau kejadian" required></textarea>
                        </div>

                        <!-- Field: Location -->
                        <div class="mb-3">
                            <label for="reportLocation" class="form-label">Lokasi</label>
                            <input type="text" id="reportLocation" class="form-control" placeholder="Contoh: Jalan Merdeka No.1" required />
                        </div>

                        <!-- Hidden: editing id (di-manage oleh JS variable editingReportId) -->
                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" class="btn btn-outline-secondary fw-bold px-4" id="btnDraft">Simpan Draft</button>
                            <button id="btnSubmit" type="button" class="btn btn-primary fw-bold px-4">
                                Ajukan <i class="bi bi-send-fill ms-1"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>

    <!-- Script: buka modal & wire tombol -->
    <script>
        (function () {
            // Jika tombol "Tambah Laporan Baru" punya id lain, ganti 'btnAddReport' sesuai elemen Anda
            const btnAdd = document.getElementById('btnAddReport');
            const modalEl = document.getElementById('reportModal');

            function resetForm() {
                editingReportId = null; // global var dari app.js
                const f = document.getElementById('reportForm');
                if (!f) return;
                f.reset();
                // kosongkan juga input manual jika diperlukan
                document.getElementById('reportTitle').value = '';
                document.getElementById('reportCategory').value = '';
                document.getElementById('reportDescription').value = '';
                document.getElementById('reportLocation').value = '';
            }

            if (btnAdd && modalEl) {
                btnAdd.addEventListener('click', function () {
                    resetForm();
                    new bootstrap.Modal(modalEl).show();
                });
            }

            // Tombol Simpan Draft
            const btnDraft = document.getElementById('btnDraft');
            if (btnDraft) {
                btnDraft.addEventListener('click', function () {
                    // Gunakan status 'DRAFT' — sesuaikan jika backend pakai nama lain
                    handleReportSubmit('DRAFT');
                });
            }

            // Tombol Ajukan
            const btnSubmit = document.getElementById('btnSubmit');
            if (btnSubmit) {
                btnSubmit.addEventListener('click', function () {
                    // Gunakan status 'SUBMITTED' atau sesuai skema backend Anda
                    handleReportSubmit('SUBMITTED');
                });
            }
        })();
    </script>
</body>
</html>
