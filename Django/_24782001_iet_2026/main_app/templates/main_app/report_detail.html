<style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .detail-card { background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 600px; border: 1px solid rgba(255,255,255,0.05); }
    h2 { background: linear-gradient(to right, #8b5cf6, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    .info { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
    label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    p { margin: 5px 0 0 0; font-size: 16px; }
    .back-btn { display: inline-block; margin-top: 30px; color: #2dd4bf; text-decoration: none; font-weight: 600; }
</style>

<div class="detail-card">
    <h2>Detail Laporan 🔍</h2>
    <div class="info">
        <label>Judul</label>
        <p>{{ object.title }}</p>
    </div>
    <div class="info">
        <label>Kategori</label>
        <p>{{ object.category }}</p>
    </div>
    <div class="info">
        <label>Lokasi</label>
        <p>{{ object.location }}</p>
    </div>
    <div class="info">
        <label>Deskripsi</label>
        <p>{{ object.description }}</p>
    </div>
    <div class="info">
        <label>Status Saat Ini</label>
        <p><b>{{ object.get_status_display }}</b></p>
    </div>
    <a href="{% url 'main_app:home' %}" class="back-btn">← Kembali ke Dashboard</a>
</div>
